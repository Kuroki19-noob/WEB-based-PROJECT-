<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Lagman’s Diner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <h1>Reservation Dashboard</h1>
        <div style="overflow-x: auto;">
            <table style="width: 100%; border-collapse: collapse; margin-top: 2rem; border: 1px solid var(--border-color);">
                <thead>
                    <tr style="background-color: var(--accent-color); color: white;">
                        <th style="padding: 1rem;">ID</th>
                        <th style="padding: 1rem;">Date</th>
                        <th style="padding: 1rem;">Table</th>
                        <th style="padding: 1rem;">Email</th>
                        <th style="padding: 1rem;">Phone</th>
                    </tr>
                </thead>
                <tbody id="res-body"></tbody>
            </table>
        </div>
    </main>

    <script>
        function checkAuth() {
            const user = JSON.parse(localStorage.getItem('user'));
            const token = localStorage.getItem('token');
            if (!token || !user || user.role !== 'admin') {
                alert('Access denied. Admin privileges required.');
                window.location.href = '/Login.html';
                return false;
            }
            return token;
        }

        async function fetchReservations() {
            const token = checkAuth();
            if (!token) return;

            try {
                const response = await fetch('/api/v1/reservations/all', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.message || 'Failed to fetch reservations');
                }

                const tbody = document.getElementById('res-body');
                tbody.innerHTML = '';
                data.reservations.forEach(res => {
                    tbody.innerHTML += `<tr>
                        <td style="padding: 1rem; border-bottom: 1px solid var(--border-color);">${res.id}</td>
                        <td style="padding: 1rem; border-bottom: 1px solid var(--border-color);">${res.DateD.split('T')[0]}</td>
                        <td style="padding: 1rem; border-bottom: 1px solid var(--border-color);">${res.TableNum}</td>
                        <td style="padding: 1rem; border-bottom: 1px solid var(--border-color);">${res.email}</td>
                        <td style="padding: 1rem; border-bottom: 1px solid var(--border-color);">${res.number}</td>
                    </tr>`;
                });
            } catch (err) { 
                console.error(err);
                alert('Error: ' + err.message);
            }
        }
        fetchReservations();
    </script>
</body>
</html>
