<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservation | Lagman’s Diner</title>
    <link rel="stylesheet" href="../style.css">
    <script src="/script.js" defer></script>
    <script src="/limitdate.js" defer></script>
    <script src="/logout.js" defer></script>
</head>
<body>
    <nav class="top-bar">
        <div class="container">
            <ul class="nav-list">
                <li><a href="/index.html">Home</a></li>
                <li><a href="/Pages/menu.html">Menu</a></li>
                <li><a href="/Pages/Reservation.html">Reservation</a></li>
                <li><a href="/Pages/team.html">Team</a></li>
                <li><a href="/Profile.html">Profile</a></li>
                <li><a href="#" id="logoutBtn">Logout</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <h1>Reservation</h1>
        <div id="error-msg" style="color: red; margin-bottom: 1rem;"></div>
        <div style="max-width: 500px; margin: 0 auto; background: white; padding: 2rem; border-radius: 12px; border: 1px solid var(--border-color);">
            <form id="form">
                <label>Name:</label>
                <input type="text" id="name-id" required style="margin-bottom: 1rem;">
                
                <label>Email:</label>
                <input type="email" id="email-id" required style="margin-bottom: 1rem;">
                
                <label>Table Number:</label>
                <input type="number" id="table-id" min="1" max="13" value="1" required style="margin-bottom: 1rem;">
                
                <label>Phone Number:</label>
                <input type="tel" id="phone-id" required style="margin-bottom: 1rem;">
                
                <label>Date:</label>
                <input type="date" id="dateID" required style="margin-bottom: 1rem;">
                
                <button type="submit">Submit Reservation</button>
            </form>
        </div>
    </main>

    <footer class="container" style="text-align: center; border-top: 1px solid var(--border-color); margin-top: 4rem;">
        <p>&copy; 2026 Lagman’s Diner</p>
    </footer>
</body>
</html>
