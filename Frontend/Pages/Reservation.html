    <div class="reserve-wrapper">
        <h1>Reservation</h1>
        
        <div class="reserve-content">
            <div id="error-msg"></div>
            <div class="reserve-border">
                 
            
                <form id="form" class="reserve-form">
    
               <label for="name-id">Name:</label>
               <input type="text" id="name-id" required>

               <label for="email-id">Email:</label>
               <input type="email" id="email-id" required>

               <label for="table-id">Table Number:</label>
               <input type="number" id="table-id" min="1" max="13" value="1" required>

              <label for="phone-id">Phone Number:</label>
              <input type="tel" id="phone-id" required>

              <label for="dateID">Date:</label>
              <input type="date" id="dateID" required>

              <button type="submit">Submit</button>
</form>
            </div>
        </div>
    </div>
