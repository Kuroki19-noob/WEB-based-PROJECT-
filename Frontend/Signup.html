<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Lagman’s Diner</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body class="hero-bg" style="min-height: 100vh; display: flex; align-items: center; justify-content: center;">
    <div style="background: white; padding: 3rem; border-radius: 12px; width: min(400px, 90%); box-shadow: 0 10px 25px rgba(0,0,0,0.1);">
        <h1 style="margin-bottom: 2rem;">Sign Up</h1>
        <p id="error-msg" style="color: red; margin-bottom: 1rem;"></p>
        <form id="form" style="display: flex; flex-direction: column; gap: 1rem;">
            <input type="text" id="username-input" placeholder="Username" required>
            <input type="email" id="email-input" placeholder="Email" required>
            <input type="password" id="password-input" placeholder="Password" required>
            <input type="password" id="repeat-password-input" placeholder="Repeat Password" required>
            <button type="submit">Sign up</button>
        </form>
        <p style="margin-top: 1rem; font-size: 0.9rem;">Already have an account? <a href="Login.html">Login</a></p>
    </div>
</body>
</html>
